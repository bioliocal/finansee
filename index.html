<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finansee - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .brand-panel {
            flex: 1;
            background-color: #6E8E6E;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            padding: 20px;
        }

        .brand-panel h2 {
            font-size: 48px;
            margin: 20px 0 0 0;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: circle(49%);
        }

        .brand-logo-large {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .auth-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6f4;
            padding: 40px;
            overflow-y: auto;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .auth-wrapper h1 {
            color: #557A55;
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .auth-wrapper p.subtitle {
            color: #777;
            font-size: 15px;
            margin: 0 0 30px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
            background-color: #fff;
        }

        .form-group input:focus {
            border-color: #557A55;
            box-shadow: 0 0 0 3px rgba(85, 122, 85, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: #6E8E6E;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }

        .btn-auth:hover {
            background-color: #557A55;
        }

        .error-message {
            color: #c62828;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
            font-weight: 500;
        }

        .switch-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 25px;
        }

        .switch-text a {
            color: #6E8E6E;
            text-decoration: none;
            font-weight: bold;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            .brand-panel {
                flex: none;
                width: 100%;
                padding: 40px 20px;
            }

            .brand-panel h2 {
                font-size: 32px; 
                margin: 10px 0 0 0;
            }

            .logo {
                width: 90px; 
                height: 90px;
            }

            .auth-panel {
                flex: 1;
                width: 100%;
                padding: 30px 20px 50px 20px;
                align-items: flex-start; 
            }
            
            .auth-wrapper {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="brand-panel">
        <div class="logo">
            <img src="logoe.jpeg" alt="Logo" class="brand-logo-large">
        </div>
        <h2>Finansee</h2>
    </div>

    <div class="auth-panel">
        <div class="auth-wrapper">
            
            <div id="loginSection">
                <h1>Log In</h1>
                <p class="subtitle">Welcome back! Please enter your details.</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUser">Username or Email</label>
                        <input type="text" id="loginUser" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-auth">Log In</button>
                    <div id="loginError" class="error-message">username/email/password salah</div>
                </form>
                <div class="switch-text">
                    Don't have an account? <a href="#" id="toSignUp">Sign Up</a>
                </div>
            </div>

            <div id="signUpSection" class="hidden">
                <h1>Sign Up</h1>
                <p class="subtitle">Create an account to track your finance</p>
                <form id="signUpForm">
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-auth">Sign Up</button>
                </form>
                <div class="switch-text">
                    Already have an account? <a href="#" id="toLogin">Log In</a>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
